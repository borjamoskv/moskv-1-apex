<html lang="es">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&family=Outfit:wght@300;400;600;700;800&family=Georgia&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #050506;
            --card-bg: rgba(10, 10, 12, 0.9);
            --accent-blue: #2B3BE5;
            --accent-red: #E52B2B;
            --text-light: #F3F3F3;
            --text-muted: #6F6F7F;
            --border-color: rgba(255, 255, 255, 0.05);
            --neon-blue-glow: 0 0 30px rgba(43, 59, 229, 0.4);
            --neon-red-glow: 0 0 30px rgba(229, 43, 43, 0.4);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-light);
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            position: relative;
        }

        /* Scanline Overlay (Hacker/CRT Terminal feel) */
        body::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 9999;
            background-size: 100% 4px, 6px 100%;
            pointer-events: none;
            opacity: 0.4;
        }

        /* Analog Grain Layer */
        .analog-grain {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.025;
            pointer-events: none;
            z-index: 1000;
        }

        /* Ambient Glow Orbs */
        .glow-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(160px);
            z-index: -1;
            opacity: 0.2;
            pointer-events: none;
            transition: all 1s ease;
        }

        .orb-1 {
            top: -20%; left: -10%;
            width: 60vw; height: 60vh;
            background: var(--accent-blue);
        }

        .orb-2 {
            bottom: -20%; right: -10%;
            width: 60vw; height: 60vh;
            background: var(--accent-red);
        }

        /* Container */
        .container {
            max-width: 950px;
            width: 100%;
            margin: 0 auto;
            padding: 40px 20px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 20px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .brand h1 {
            font-size: 22px;
            font-weight: 900;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .brand-badge {
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-red));
            color: #fff;
            font-size: 9px;
            font-weight: 900;
            padding: 5px 10px;
            border-radius: 4px;
            letter-spacing: 1px;
            box-shadow: var(--neon-blue-glow);
        }

        .system-metrics {
            display: flex;
            gap: 20px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: var(--text-muted);
        }

        .metric-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-dot-pulse {
            width: 6px;
            height: 6px;
            background-color: #00FF66;
            border-radius: 50%;
            box-shadow: 0 0 10px #00FF66;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.4); opacity: 0.6; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Premium Rotating Border Card */
        .card-wrapper {
            position: relative;
            border-radius: 16px;
            padding: 2px;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-red));
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
            transition: box-shadow 0.5s ease;
        }

        .card-wrapper.blue-mode {
            background: linear-gradient(135deg, var(--accent-blue), rgba(255,255,255,0.05));
            box-shadow: var(--neon-blue-glow);
        }

        .card-wrapper.red-mode {
            background: linear-gradient(135deg, var(--accent-red), rgba(0,0,0,0.8));
            box-shadow: var(--neon-red-glow);
        }

        .card {
            background: var(--card-bg);
            border-radius: 14px;
            padding: 45px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            flex-direction: column;
            gap: 35px;
            position: relative;
        }

        /* Image Mask and Reveal */
        .scene-image-container {
            width: 100%;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.04);
            position: relative;
            aspect-ratio: 16/9;
            background-color: #000;
        }

        .scene-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .scene-image.loaded {
            opacity: 0.85;
        }

        .scene-image-container::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(180deg, transparent 50%, rgba(5, 5, 6, 0.95) 100%);
            pointer-events: none;
        }

        /* Narrative styling */
        .content-area {
            font-family: 'Georgia', serif;
            font-size: 19px;
            line-height: 1.85;
            color: var(--text-light);
            text-align: justify;
            min-height: 160px;
        }

        .content-area p {
            margin-bottom: 22px;
            text-indent: 1.8em;
        }

        .content-area p:first-of-type {
            text-indent: 0;
        }

        /* YAML console blocks (C5-REAL Ledger Outputs) */
        .console-block {
            font-family: 'JetBrains Mono', monospace;
            background-color: rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-left: 3px solid var(--accent-blue);
            padding: 18px 24px;
            border-radius: 6px;
            font-size: 13px;
            line-height: 1.6;
            color: #83A598;
            margin: 15px 0;
            overflow-x: auto;
            position: relative;
        }

        .console-block::before {
            content: "LEDGER";
            position: absolute;
            top: 6px; right: 10px;
            font-size: 9px;
            color: var(--text-muted);
            letter-spacing: 1px;
        }

        .console-block.red-alert {
            border-left-color: var(--accent-red);
            color: #FB4934;
        }

        /* Buttons & Choices */
        .choices-area {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-top: 15px;
        }

        .btn-choice {
            background-color: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-color);
            color: var(--text-light);
            font-family: 'Outfit', sans-serif;
            font-size: 16px;
            font-weight: 600;
            padding: 18px 28px;
            border-radius: 10px;
            cursor: pointer;
            text-align: left;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            overflow: hidden;
            outline: none;
        }

        .btn-choice:active {
            transform: scale(0.98);
        }

        .btn-choice:hover {
            background-color: rgba(43, 59, 229, 0.1);
            border-color: var(--accent-blue);
            box-shadow: 0 0 15px rgba(43, 59, 229, 0.2);
            transform: translateX(6px);
        }

        .btn-choice.danger:hover {
            background-color: rgba(229, 43, 43, 0.1);
            border-color: var(--accent-red);
            box-shadow: 0 0 15px rgba(229, 43, 43, 0.2);
        }

        .btn-choice::after {
            content: '→';
            font-size: 20px;
            opacity: 0;
            transition: opacity 0.3s ease, transform 0.3s ease;
            transform: translateX(-15px);
        }

        .btn-choice:hover::after {
            opacity: 1;
            transform: translateX(0);
        }

        /* Skip Typewriter Button */
        .skip-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            cursor: pointer;
            align-self: flex-end;
            margin-top: -15px;
            transition: color 0.3s ease;
            text-decoration: underline;
        }

        .skip-btn:hover {
            color: var(--text-light);
        }

        /* Cover layout styling */
        .cover-title {
            font-size: 44px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 4px;
            text-align: center;
            background: linear-gradient(135deg, #FFFFFF, #9F9FBF);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }

        .cover-subtitle {
            text-align: center;
            font-size: 13px;
            color: var(--accent-red);
            letter-spacing: 4px;
            text-transform: uppercase;
            font-weight: 800;
            margin-bottom: 10px;
        }

        /* Footer */
        footer {
            margin-top: 40px;
            text-align: center;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: var(--text-muted);
            border-top: 1px solid var(--border-color);
            padding-top: 20px;
        }

        footer a {
            color: var(--text-muted);
            text-decoration: none;
            transition: color 0.3s ease;
            border-bottom: 1px dashed var(--text-muted);
        }

        footer a:hover {
            color: var(--accent-blue);
            border-bottom-color: var(--accent-blue);
        }

        /* Glitched text */
        .glitch-active {
            animation: glitch-anim 0.3s infinite;
        }

        @keyframes glitch-anim {
            0% { text-shadow: 2px 0 0 red, -2px 0 0 blue; }
            50% { text-shadow: -2px 0 0 red, 2px 0 0 blue; }
            100% { text-shadow: 2px 0 0 red, -2px 0 0 blue; }
        }
    </style>
</head>

                ],
                mode: "normal",
                ledger: "LEDGER: TERMINAL",
                entropy: "ENTROPY: NULL"
            }
        };

        let currentInterval = null;

        function typeWriter(element, htmlText, speed, callback) {
            element.innerHTML = "";
            let idx = 0;
            let currentHtml = "";
            
            // Función auxiliar para parsear tags de una vez
            function step() {
                if (idx < htmlText.length) {
                    if (htmlText[idx] === '<') {
                        // Buscar el cierre del tag para renderizarlo de golpe
                        const closeIdx = htmlText.indexOf('>', idx);
                        if (closeIdx !== -1) {
                            currentHtml += htmlText.substring(idx, closeIdx + 1);
                            idx = closeIdx + 1;
                        }
                    } else {
                        currentHtml += htmlText[idx];
                        idx++;
                    }
                    element.innerHTML = currentHtml;
                    currentInterval = setTimeout(step, speed);
                } else {
                    if (callback) callback();
                }
            }
            step();
        }

        function skipTypewriter(stageKey) {
            if (currentInterval) {
                clearTimeout(currentInterval);
                currentInterval = null;
            }
            const stage = STAGE_DATA[stageKey];
            const contentArea = document.querySelector('.content-area');
            contentArea.innerHTML = stage.text.replace(/\n/g, '<br/>');
            
            // Mostrar elecciones
            document.querySelector('.choices-area').style.opacity = 1;
            document.querySelector('.skip-btn').style.display = 'none';
        }

        function renderStage(stageKey) {
            if (currentInterval) {
                clearTimeout(currentInterval);
                currentInterval = null;
            }

            const stage = STAGE_DATA[stageKey];
            const wrapper = document.getElementById('game-card-wrapper');
            const card = document.getElementById('game-card');
            
            // Actualizar header metrics
            document.getElementById('ledger-indicator').innerText = stage.ledger;
            document.getElementById('entropy-indicator').innerText = stage.entropy;

            // Actualizar orbes y wrappers de diseño
            wrapper.className = "card-wrapper " + (stage.mode === 'blue' ? 'blue-mode' : stage.mode === 'red' ? 'red-mode' : '');
            
            const orbBlue = document.getElementById('orb-blue');
            const orbRed = document.getElementById('orb-red');
            if (stage.mode === 'red') {
                orbRed.style.opacity = 0.4;
                orbBlue.style.opacity = 0.05;
            } else if (stage.mode === 'blue') {
                orbBlue.style.opacity = 0.4;
                orbRed.style.opacity = 0.05;
            } else {
                orbBlue.style.opacity = 0.2;
                orbRed.style.opacity = 0.2;
            }

            // Crear layout interno
            let imageHtml = "";
            if (stage.image) {
                imageHtml = `
                    <div class="scene-image-container">
                        <img src="${stage.image}" class="scene-image" id="scene-img" alt="${stage.title}" />
                    </div>
                `;
            }

            let titleHtml = "";
            if (stageKey === 'cover') {
                titleHtml = `
                    <h2 class="cover-title">${stage.title}</h2>
                    <h3 class="cover-subtitle">${stage.subtitle}</h3>
                `;
            } else {
                titleHtml = `<h2 style="font-size: 24px; font-weight: 800; border-bottom: 1px solid var(--border-color); padding-bottom: 10px;">${stage.title}</h2>`;
            }

            let consoleHtml = "";
            if (stage.console) {
                consoleHtml = `
                    <div class="console-block ${stage.consoleClass || ''}">
                        ${stage.console.replace(/\n/g, '<br/>')}
                    </div>
                `;
            }

            let choicesHtml = "";
            stage.choices.forEach(choice => {
                const dangerClass = choice.danger ? 'danger' : '';
                choicesHtml += `
                    <button class="btn-choice ${dangerClass}" onclick="renderStage('${choice.target}')">
                        ${choice.text}
                    </button>
                `;
            });

            // Fade out
            card.style.opacity = 0;
            
            setTimeout(() => {
                card.innerHTML = `
                    ${titleHtml}
                    ${imageHtml}
                    <div class="content-area"></div>
                    <button class="skip-btn" onclick="skipTypewriter('${stageKey}')">Saltar animación</button>
                    ${consoleHtml}
                    <div class="choices-area" style="opacity: 0; transition: opacity 0.5s ease;">
                        ${choicesHtml}
                    </div>
                `;
                
                // Fade in
                card.style.opacity = 1;

                // Cargar imagen suavemente
                const img = document.getElementById('scene-img');
                if (img) {
                    img.onload = () => img.classList.add('loaded');
                    // Backup por si ya cargó
                    if (img.complete) img.classList.add('loaded');
                }

                const contentArea = card.querySelector('.content-area');
                
                // Si es la pantalla final o la portada, no hacer typewriter largo para evitar fatiga de clicks
                if (stageKey === 'cover' || stageKey === 'final') {
                    contentArea.innerHTML = stage.text;
                    card.querySelector('.choices-area').style.opacity = 1;
                    card.querySelector('.skip-btn').style.display = 'none';
                } else {
                    // Typewriter
                    typeWriter(contentArea, stage.text.replace(/\n/g, '<br/>'), 15, () => {
                        card.querySelector('.choices-area').style.opacity = 1;
                        card.querySelector('.skip-btn').style.display = 'none';
                    });
                }
            }, 150);
        }

        // Carga Inicial
        window.addEventListener('DOMContentLoaded', () => {
            renderStage('cover');
        });
    </script>
</body>
</html>
