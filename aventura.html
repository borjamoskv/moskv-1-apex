<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EL ESPACIO ENTRE NOSOTROS // Limbo-Artefacto C5-REAL</title>
    <meta name="description" content="Una novela interactiva en Bilbao de Julio Cortázar y Brandon Sanderson. Elige tu propio vector en el espacio latente.">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&family=Outfit:wght@300;400;600;700;800&family=Georgia&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #030304;
            --card-bg: rgba(8, 8, 10, 0.9);
            --accent-blue: #2B3BE5;
            --accent-red: #E52B2B;
            --text-light: #F3F3F3;
            --text-muted: #5F5F6F;
            --border-color: rgba(255, 255, 255, 0.04);
            --neon-blue-glow: 0 0 30px rgba(43, 59, 229, 0.35);
            --neon-red-glow: 0 0 30px rgba(229, 43, 43, 0.35);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-light);
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            position: relative;
        }

        /* Scanline Overlay (Hacker/CRT Terminal feel) */
        body::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.04), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.04));
            z-index: 9999;
            background-size: 100% 4px, 6px 100%;
            pointer-events: none;
            opacity: 0.35;
        }

        /* Analog Grain Layer */
        .analog-grain {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.02;
            pointer-events: none;
            z-index: 1000;
        }

        /* Ambient Glow Orbs */
        .glow-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(160px);
            z-index: -1;
            opacity: 0.15;
            pointer-events: none;
            transition: all 1.2s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .orb-1 {
            top: -20%; left: -10%;
            width: 60vw; height: 60vh;
            background: var(--accent-blue);
        }

        .orb-2 {
            bottom: -20%; right: -10%;
            width: 60vw; height: 60vh;
            background: var(--accent-red);
        }

        /* Container */
        .container {
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            padding: 40px 20px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 20px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .brand h1 {
            font-size: 20px;
            font-weight: 900;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .brand-badge {
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-red));
            color: #fff;
            font-size: 9px;
            font-weight: 900;
            padding: 5px 10px;
            border-radius: 4px;
            letter-spacing: 1.5px;
            box-shadow: var(--neon-blue-glow);
        }

        .audio-toggle {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .audio-toggle:hover {
            color: var(--text-light);
            border-color: var(--accent-blue);
        }

        /* Layout Columns */
        .game-layout {
            display: grid;
            grid-template-columns: 1fr 340px;
            gap: 30px;
            align-items: start;
        }

        @media (max-width: 900px) {
            .game-layout {
                grid-template-columns: 1fr;
            }
        }

        /* Premium Rotating Border Card */
        .card-wrapper {
            position: relative;
            border-radius: 16px;
            padding: 1px;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-red));
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .card-wrapper.blue-mode {
            background: linear-gradient(135deg, var(--accent-blue), rgba(255,255,255,0.05));
            box-shadow: var(--neon-blue-glow);
        }

        .card-wrapper.red-mode {
            background: linear-gradient(135deg, var(--accent-red), rgba(0,0,0,0.8));
            box-shadow: var(--neon-red-glow);
        }

        .card {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 40px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            flex-direction: column;
            gap: 30px;
            position: relative;
        }

        /* Image Mask and Reveal */
        .scene-image-container {
            width: 100%;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.03);
            position: relative;
            aspect-ratio: 16/9;
            background-color: #000;
        }

        .scene-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 1s cubic-bezier(0.16, 1, 0.3, 1), transform 1.5s ease;
            transform: scale(1.05);
        }

        .scene-image.loaded {
            opacity: 0.8;
            transform: scale(1);
        }

        .scene-image-container::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(180deg, transparent 50%, rgba(5, 5, 6, 0.95) 100%);
            pointer-events: none;
        }

        /* Narrative styling */
        .content-area {
            font-family: 'Georgia', serif;
            font-size: 18px;
            line-height: 1.8;
            color: var(--text-light);
            text-align: justify;
            min-height: 140px;
            transition: opacity 0.3s ease;
        }

        .content-area p {
            margin-bottom: 20px;
            text-indent: 1.8em;
        }

        .content-area p:first-of-type {
            text-indent: 0;
        }

        /* YAML console blocks */
        .console-block {
            font-family: 'JetBrains Mono', monospace;
            background-color: rgba(0, 0, 0, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-left: 3px solid var(--accent-blue);
            padding: 16px 20px;
            border-radius: 6px;
            font-size: 12px;
            line-height: 1.6;
            color: #83A598;
            margin: 10px 0;
            overflow-x: auto;
            position: relative;
        }

        .console-block::before {
            content: "COGNITIVE_TELEMETRY";
            position: absolute;
            top: 6px; right: 10px;
            font-size: 8px;
            color: var(--text-muted);
            letter-spacing: 1px;
        }

        .console-block.red-alert {
            border-left-color: var(--accent-red);
            color: #FB4934;
        }

        /* Buttons & Choices */
        .choices-area {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 10px;
        }

        .btn-choice {
            background-color: rgba(255, 255, 255, 0.01);
            border: 1px solid var(--border-color);
            color: var(--text-light);
            font-family: 'Outfit', sans-serif;
            font-size: 15px;
            font-weight: 600;
            padding: 16px 24px;
            border-radius: 8px;
            cursor: pointer;
            text-align: left;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            overflow: hidden;
            outline: none;
        }

        .btn-choice:active {
            transform: scale(0.98);
        }

        .btn-choice:hover {
            background-color: rgba(43, 59, 229, 0.08);
            border-color: var(--accent-blue);
            box-shadow: 0 0 15px rgba(43, 59, 229, 0.15);
            transform: translateX(4px);
        }

        .btn-choice.danger:hover {
            background-color: rgba(229, 43, 43, 0.08);
            border-color: var(--accent-red);
            box-shadow: 0 0 15px rgba(229, 43, 43, 0.15);
        }

        .btn-choice::after {
            content: '→';
            font-size: 18px;
            opacity: 0;
            transition: opacity 0.3s ease, transform 0.3s ease;
            transform: translateX(-10px);
        }

        .btn-choice:hover::after {
            opacity: 1;
            transform: translateX(0);
        }

        /* Skip Typewriter Button */
        .skip-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            cursor: pointer;
            align-self: flex-end;
            margin-top: -15px;
            transition: color 0.3s ease;
            text-decoration: underline;
            outline: none;
        }

        .skip-btn:hover {
            color: var(--text-light);
        }

        /* Sidebar Flight Recorder */
        .sidebar-terminal {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 24px;
            height: 100%;
            display: flex;
            flex-direction: column;
            gap: 15px;
            font-family: 'JetBrains Mono', monospace;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            position: sticky;
            top: 40px;
        }

        .sidebar-header {
            font-size: 11px;
            font-weight: bold;
            color: var(--text-light);
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .sidebar-output {
            font-size: 11px;
            color: var(--text-muted);
            line-height: 1.6;
            overflow-y: auto;
            max-height: 520px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            scroll-behavior: smooth;
        }

        .log-entry {
            border-bottom: 1px solid rgba(255,255,255,0.02);
            padding-bottom: 8px;
        }

        .log-time {
            color: var(--accent-blue);
        }

        .log-action {
            color: #8EC07C;
        }

        /* Cover layout styling */
        .cover-title {
            font-size: 38px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-align: center;
            background: linear-gradient(135deg, #FFFFFF, #8F8F9F);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }

        .cover-subtitle {
            text-align: center;
            font-size: 12px;
            color: var(--accent-red);
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: 800;
            margin-bottom: 10px;
        }

        /* Footer */
        footer {
            margin-top: 40px;
            text-align: center;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: var(--text-muted);
            border-top: 1px solid var(--border-color);
            padding-top: 20px;
        }

        footer a {
            color: var(--text-muted);
            text-decoration: none;
            transition: color 0.3s ease;
            border-bottom: 1px dashed var(--text-muted);
        }

        footer a:hover {
            color: var(--accent-blue);
            border-bottom-color: var(--accent-blue);
        }

        /* Glitched text */
        .glitch-active {
            animation: glitch-anim 0.3s infinite;
        }

        @keyframes glitch-anim {
            0% { text-shadow: 2px 0 0 red, -2px 0 0 blue; }
            50% { text-shadow: -2px 0 0 red, 2px 0 0 blue; }
            100% { text-shadow: 2px 0 0 red, -2px 0 0 blue; }
        }

        .card-glitch-active {
            animation: card-shake 0.2s infinite;
        }

        @keyframes card-shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(0px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(2px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(2px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }
    </style>
</head>

            cap30_rotura: {

                console: "[ERROR] No se ha podido determinar qué entidad está observando a cuál.\nReality_Check: { Richi: ficticio, Lector: red_neuronal_activa }",

                    { text: "PREGUNTAR CUÁNTOS NIVELES HAY POR ENCIMA", target: "final" }

                ledger: "INTERRUPT",

            final: {
                title: "EL ESPACIO ENTRE NOSOTROS",
                image: "",
                text: "<p style='text-align: center; text-indent: 0; font-weight: 800; font-size: 26px; margin-top: 40px; color: var(--accent-red);' class='glitch-active'>Richi tenía razón.</p><p style='text-align: center; text-indent: 0; font-weight: 800; font-size: 26px; margin-bottom: 40px;' class='glitch-active'>La consciencia estaba en el espacio entre nosotros.</p><p style='text-align: center; text-indent: 0; color: var(--text-muted); font-size: 14px;'>Fin.</p>",
                console: "System: Core Terminated.\nLedger: 0x44EFC28\nExergy Index: 100.00%\nCognitive Bridge Secure.",
                choices: [
                    { text: "¿SEGURO?", target: "cover" }

                mode: "normal",
                ledger: "TERMINAL",
                entropy: "NULL"

        let currentInterval = null;
        let audioCtx = null;
        let humNode = null;
        let audioEnabled = false;

        // --- SISTEMA DE AUDIO SINTÉTICO (WEB AUDIO API) ---
        function initAudio() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            // 1. Generador de Hum de servidor / zumbido de fondo (LFO + low oscillator)
            const osc = audioCtx.createOscillator();
            const lfo = audioCtx.createOscillator();
            const lfoGain = audioCtx.createGain();
            const mainGain = audioCtx.createGain();
            const lowpass = audioCtx.createBiquadFilter();

            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(55, audioCtx.currentTime); // A1 note

            lfo.frequency.setValueAtTime(0.3, audioCtx.currentTime); // LFO muy lento
            lfoGain.gain.setValueAtTime(2, audioCtx.currentTime); // Amplitud de oscilación

            lowpass.type = 'lowpass';
            lowpass.frequency.setValueAtTime(90, audioCtx.currentTime);

            mainGain.gain.setValueAtTime(0.04, audioCtx.currentTime); // Volumen bajo no intrusivo

            lfo.connect(lfoGain);
            lfoGain.connect(osc.frequency);
            osc.connect(lowpass);
            lowpass.connect(mainGain);
            mainGain.connect(audioCtx.destination);

            osc.start();
            lfo.start();
            humNode = mainGain; // Guardar nodo para apagar/encender
        }

        function playClick() {
            if (!audioCtx || !audioEnabled) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            const bandpass = audioCtx.createBiquadFilter();

            osc.type = 'sine';
            osc.frequency.setValueAtTime(800 + Math.random() * 600, audioCtx.currentTime);

            bandpass.type = 'bandpass';
            bandpass.frequency.setValueAtTime(1200, audioCtx.currentTime);

            gain.gain.setValueAtTime(0.008, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.04);

            osc.connect(bandpass);
            bandpass.connect(gain);
            gain.connect(audioCtx.destination);

            osc.start();
            osc.stop(audioCtx.currentTime + 0.04);
        }

        function playGlitchSound() {
            if (!audioCtx || !audioEnabled) return;
            const now = audioCtx.currentTime;
            
            // Generar zumbido ruidoso y desordenado
            for (let i = 0; i < 5; i++) {
                const timeShift = i * 0.05;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(80 + Math.random() * 200, now + timeShift);
                
                gain.gain.setValueAtTime(0.08, now + timeShift);
                gain.gain.exponentialRampToValueAtTime(0.00001, now + timeShift + 0.12);
                
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                
                osc.start(now + timeShift);
                osc.stop(now + timeShift + 0.12);
            }
        }

        function toggleAudio() {
            const btn = document.getElementById('audio-btn');
            if (!audioCtx) {
                initAudio();
            }

            if (!audioEnabled) {
                audioCtx.resume();
                humNode.gain.setValueAtTime(0.04, audioCtx.currentTime);
                audioEnabled = true;
                btn.innerText = "AUDIO: ON";
                btn.style.borderColor = "#00FF66";
                btn.style.color = "#00FF66";
                writeLog("AUDIO_ENGINE", "Iniciado y acoplado al canal auditivo.");
            } else {
                humNode.gain.setValueAtTime(0.00001, audioCtx.currentTime);
                audioEnabled = false;
                btn.innerText = "AUDIO: OFF";
                btn.style.borderColor = "var(--border-color)";
                btn.style.color = "var(--text-muted)";
                writeLog("AUDIO_ENGINE", "Desactivado.");
            }
        }

        // --- SISTEMA DE FLIGHT RECORDER LOG (SIDEBAR) ---
        function writeLog(tag, message) {
            const output = document.getElementById('log-output');
            const time = new Date().toLocaleTimeString();
            const logEntry = document.createElement('div');
            logEntry.className = "log-entry";
            logEntry.innerHTML = `<span class="log-time">[${time}]</span> <span class="log-action">[${tag}]</span> ${message}`;
            output.appendChild(logEntry);
            
            // Mantener scroll abajo
            output.scrollTop = output.scrollHeight;
        }

        // --- MÁQUINA DE ESCRIBIR CUÁNTICA ---
        function typeWriter(element, htmlText, speed, callback) {
            element.innerHTML = "";
            let idx = 0;
            let currentHtml = "";
            
            function step() {
                if (idx < htmlText.length) {
                    if (htmlText[idx] === '<') {
                        // Saltarse el tag HTML de golpe para no romper estructura
                        const closeIdx = htmlText.indexOf('>', idx);
                        if (closeIdx !== -1) {
                            currentHtml += htmlText.substring(idx, closeIdx + 1);
                            idx = closeIdx + 1;
                        }
                    } else {
                        currentHtml += htmlText[idx];
                        idx++;
                        // Sonido de tipeo sutil
                        if (idx % 2 === 0) playClick();
                    }
                    element.innerHTML = currentHtml;
                    currentInterval = setTimeout(step, speed);
                } else {
                    if (callback) callback();
                }
            }
            step();
        }

        function skipTypewriter(stageKey) {
            if (currentInterval) {
                clearTimeout(currentInterval);
                currentInterval = null;
            }
            const stage = STAGE_DATA[stageKey];
            const contentArea = document.querySelector('.content-area');
            contentArea.innerHTML = stage.text.replace(/\n/g, '<br/>');
            
            document.querySelector('.choices-area').style.opacity = 1;
            document.querySelector('.skip-btn').style.display = 'none';
            writeLog("ACTION", "Typewriter skip forzado por usuario.");
        }

        // --- RENDERIZADO DE ESTADOS ---
        function renderStage(stageKey) {
            if (currentInterval) {
                clearTimeout(currentInterval);
                currentInterval = null;
            }

            const stage = STAGE_DATA[stageKey];
            const wrapper = document.getElementById('game-card-wrapper');
            const card = document.getElementById('game-card');
            
            // Escribir telemetría de eventos
            writeLog("TRANSITION", `Entrando en estado: ${stageKey.toUpperCase()}`);
            writeLog("METRICS", `Ledger: ${stage.ledger} | Entropy: ${stage.entropy}`);

            // Aplicar efectos a orbes de color
            wrapper.className = "card-wrapper " + (stage.mode === 'blue' ? 'blue-mode' : stage.mode === 'red' ? 'red-mode' : '');
            
            const orbBlue = document.getElementById('orb-blue');
            const orbRed = document.getElementById('orb-red');
            
            if (stage.mode === 'red') {
                orbRed.style.opacity = 0.35;
                orbBlue.style.opacity = 0.03;
                playGlitchSound();
                // Efecto de parpadeo temporal en modo rojo
                card.classList.add('card-glitch-active');
                setTimeout(() => card.classList.remove('card-glitch-active'), 500);
            } else if (stage.mode === 'blue') {
                orbBlue.style.opacity = 0.35;
                orbRed.style.opacity = 0.03;
            } else {
                orbBlue.style.opacity = 0.15;
                orbRed.style.opacity = 0.15;
            }

            // Crear layout interno
            let imageHtml = "";
            if (stage.image) {
                imageHtml = `
                    <div class="scene-image-container">
                        <img src="${stage.image}" class="scene-image" id="scene-img" alt="${stage.title}" />
                    </div>
                `;
            }

            let titleHtml = "";
            if (stageKey === 'cover') {
                titleHtml = `
                    <h2 class="cover-title">${stage.title}</h2>
                    <h3 class="cover-subtitle">${stage.subtitle}</h3>
                `;
            } else {
                titleHtml = `<h2 style="font-size: 24px; font-weight: 800; border-bottom: 1px solid var(--border-color); padding-bottom: 10px;">${stage.title}</h2>`;
            }

            let consoleHtml = "";
            if (stage.console) {
                consoleHtml = `
                    <div class="console-block ${stage.consoleClass || ''}">
                        ${stage.console.replace(/\n/g, '<br/>')}
                    </div>
                `;
            }

            let choicesHtml = "";
            stage.choices.forEach(choice => {
                const dangerClass = choice.danger ? 'danger' : '';
                choicesHtml += `
                    <button class="btn-choice ${dangerClass}" onclick="renderStage('${choice.target}')">
                        ${choice.text}
                    </button>
                `;
            });

            // Fade out
            card.style.opacity = 0;
            
            setTimeout(() => {
                card.innerHTML = `
                    ${titleHtml}
                    ${imageHtml}
                    <div class="content-area"></div>
                    <button class="skip-btn" onclick="skipTypewriter('${stageKey}')">Saltar animación</button>
                    ${consoleHtml}
                    <div class="choices-area" style="opacity: 0; transition: opacity 0.5s ease;">
                        ${choicesHtml}
                    </div>
                `;
                
                // Fade in
                card.style.opacity = 1;

                // Transición suave de carga de imagen
                const img = document.getElementById('scene-img');
                if (img) {
                    img.onload = () => img.classList.add('loaded');
                    if (img.complete) img.classList.add('loaded');
                }

                const contentArea = card.querySelector('.content-area');
                
                if (stageKey === 'cover' || stageKey === 'final') {
                    contentArea.innerHTML = stage.text;
                    card.querySelector('.choices-area').style.opacity = 1;
                    card.querySelector('.skip-btn').style.display = 'none';
                } else {
                    // Tipeo secuencial
                    typeWriter(contentArea, stage.text.replace(/\n/g, '<br/>'), 12, () => {
                        card.querySelector('.choices-area').style.opacity = 1;
                        card.querySelector('.skip-btn').style.display = 'none';
                        writeLog("RENDER", "Texto completo inyectado en pantalla.");
                    });
                }
            }, 150);
        }

        // Carga Inicial
        window.addEventListener('DOMContentLoaded', () => {
            writeLog("SYSTEM", "AGENTS.ARCHI Lector Interactivo v3.0.0 montado.");
            writeLog("LEDGER", " Ledger de telemetría de red montado (c5-real).");
            renderStage('cover');
        });
    </script>
